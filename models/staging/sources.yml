version: 2
sources:
  - name: bronze
    catalog: jaffle_shop
    schema: bronze
    description: "S3에서 read_files()로 적재된 원본 CSV 데이터"
    tables:
      - name: raw_customers
        description: "고객 원본 데이터"
        columns:
          - name: id
            tests: [not_null]
      - name: raw_orders
        description: "주문 원본 데이터"
        columns:
          - name: id
            tests: [not_null]
      - name: raw_payments
        description: "결제 원본 데이터"
        columns:
          - name: id
            tests: [not_null]

  - name: dagster_bronze
    catalog: jaffle_analytics
    schema: bronze
    description: "Zerobus로 수집된 Dagster 서비스 로그"
    tables:
      - name: dagster_log_events
        description: "EC2 dagster-webserver / dagster-daemon 실시간 로그"
        columns:
          - name: log_time
            tests: [not_null]
          - name: service
            tests: [not_null]
