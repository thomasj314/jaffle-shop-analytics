version: 2
models:
  - name: orders
    description: "주문별 총 결제금액 Silver 테이블"
    columns:
      - name: order_id
        tests: [unique, not_null]
      - name: customer_id
        tests: [not_null]
      - name: order_date
        tests: [not_null]
      - name: status
        tests:
          - accepted_values:
              values: ['placed','shipped','completed','return_pending','returned']
      - name: amount
        tests: [not_null]
  - name: payments
    description: "결제 Silver 테이블 (cents→USD)"
    columns:
      - name: payment_id
        tests: [unique, not_null]
      - name: order_id
        tests: [not_null]
      - name: payment_method
        tests:
          - accepted_values:
              values: ['credit_card','coupon','bank_transfer','gift_card']
