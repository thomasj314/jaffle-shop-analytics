name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/jaffle-shop-analytics
            git pull origin main

            # dbt manifest + docs 재생성
            DBT_PROFILES_DIR=~/.dbt /home/ubuntu/.local/bin/dbt parse
            DBT_PROFILES_DIR=~/.dbt /home/ubuntu/.local/bin/dbt docs generate

            # dbt docs 서비스 최초 설치 (없을 때만)
            if [ ! -f /etc/systemd/system/dbt-docs.service ]; then
              sudo cp deploy/dbt-docs.service /etc/systemd/system/dbt-docs.service
              sudo systemctl daemon-reload
              sudo systemctl enable dbt-docs
            fi

            # Proxy API 의존성 설치
            pip3 install -r proxy_api/requirements.txt

            # Proxy API 서비스 최초 설치 (없을 때만)
            if [ ! -f /etc/systemd/system/proxy-api.service ]; then
              sudo cp deploy/proxy-api.service /etc/systemd/system/proxy-api.service
              sudo systemctl daemon-reload
              sudo systemctl enable proxy-api
            fi

            # 전체 재시작
            sudo systemctl restart dagster-webserver dagster-daemon dbt-docs proxy-api
            echo "✅ Deploy complete: $(date)"
